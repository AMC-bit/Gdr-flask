{% extends "layout.html" %}
{% block title %}Modifica Utente{% endblock %}

{% block content %}
<div class="justify-content-center align-items-center">

    <form method="POST" class="card shadow-sm p-4">
        <h3 class="h3 text-center mb-4">Modifica dell'utente</h3>

        <div class="mb-3">
        <label for="new_username" class="form-label">Nuovo username</label>
        <input
        type="text"
        id="new_username"
        name="new_username"
        class="form-control"
        value="{{ utente.nome }}"
        required>
        </div>

        <div class="mb-3">
        <label for="new_email" class="form-label">Nuova e-mail</label>
        <input
        type="text"
        id="new_email"
        name="new_email"
        class="form-control"
        value="{{ utente.email }}"
        required>
        </div>

        <div class="mb-3">
        <label for="new_password" class="form-label">Nuova password</label>
        <input
        type="text"
        id="new_password"
        name="new_password"
        class="form-control"
        value="{{ password }}"
        required>
        </div>

        <button
        type="submit"
        class="btn btn-outline-primary btn-lg w-100 ">
        Salva modifiche
        </button>

        <a
        href="{{ url_for('auth.personal_area') }}"
        class="btn btn-outline-secondary btn-sm mt-3 w-50 d-block mx-auto rounded" id="btn">
            Annulla
        </a>
    </form>
</div>
{% endblock %}
