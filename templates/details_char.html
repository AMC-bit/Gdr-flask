<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio {{ pg.nome }}</title>
</head>
<body>
    <h1>{{ pg.nome }}</h1>
    <p><strong>Classe:</strong> {{ pg.__class__.__name__ }}</p>
    <p><strong>Salute:</strong> {{ pg.salute }} / {{ pg.salute_max }}</p>
    <p><strong>Attacco:</strong> {{ pg.attacco_min }} - {{ pg.attacco_max }}</p>
    <p><strong>Livello:</strong> {{ pg.livello }}</p>
    <p><strong>Danni subiti:</strong> {{ pg.storico_danni_subiti }}</p>

    <!-- Pulsante per tornare alla lista dei personaggi-->
    <form action="{{ url_for('characters.mostra_personaggi') }}" method="get">
        <button type="submit">← Torna alla lista</button>
    </form>

    <!-- Pulsante per tornare al menu principale -->
    <form action="{{ url_for('gioco.index') }}" method="get">
        <button type="submit">Torna al menu principale</button>
    </form>
</body>
</html>
