{% extends "layout.html" %}
{% block content %}
<h1 class="h4 text-center mb-4">Seleziona Ambiente</h1>
<div class="d-flex justify-content-center align-items-center">
<form method="post" class = "card shadow-sm p-4 mb-4" style="max-width: 800px; width: 100%;">
  <select name="ambiente_id" required>
    <option disabled selected>-- scegli ambiente --</option>
    {% for id, ambiente in ambienti.items() %}
      <option value="{{ id }}">{{ ambiente.nome }}</option>
    {% endfor %}
  </select>
  <button class="btn btn-primary mt-2">Seleziona</button>
</form>
{% endblock %}
