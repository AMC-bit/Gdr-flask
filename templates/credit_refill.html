{% extends "layout.html" %}
{% block title %}Recupero Crediti{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">

    <form method="POST" class="card shadow-sm p-4" style="max-width: 800px; width: 100%;">
        <h3 class="h3 text-center mb-4">🏦 Recupero Crediti 🏦</h3>
        <h5 class="h5 text-left mb-4">Crediti attuali: {{ current_user.crediti|int }}</h5>

        <div class="mb-3">
        <img src=https://www.zerounoweb.it/wp-content/uploads/2024/10/bitcoin-3137150_1920-1.jpg
        alt="Bitcoin"
        class="img-thumbnail m-2"
        style="width: 4em; height: 4em;">
        <label for="amount" class="form-label">Inserisci i crediti da aggiungere al tuo utente</label>
        <input type="number" id="amount" name="amount" class="form-control" required>
        </div>

        {% if message %}
            <p class="p mb-4">{{ message }}</p>
        {% endif %}

        <button type="submit" class="btn btn-outline-primary btn-lg w-100">Conferma</button>
        <br>
        <a href="{{ url_for('auth.area_personale') }}" class="btn btn-outline-secondary btn-lg w-100" role="button">
            Area personale
        </a>
    </form>
</div>
{% endblock %}
