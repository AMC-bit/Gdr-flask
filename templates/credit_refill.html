{% extends "layout.html" %}
{% block title %}Recupero Crediti{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">

    <form method="POST" class="card shadow-sm p-4" style="max-width: 800px; width: 100%;">
        <h3 class="h3 text-center mb-4">Recupero Crediti</h3>

        <div class="d-flex align-items-center justify-content-center gap-4 mb-5">

            <img
            src="{{ url_for('static', filename='img/ant_pushup.gif') }}"
            alt="Formica che fa flessioni"
            style="width: 4rem; height: 4rem;">

            <div class="card shadow-sm" style="width: 20rem;">
                <div class="card-body d-flex justify-content-evenly align-items-center gap-2 p-3">
                    <img src="{{ url_for('static', filename='img/bitcoin_gif.gif') }}"
                    alt="Bitcoin_gif"
                    style="width: 4em; height: 4em;">
                    <h5 class="h5 text-center m-0 align-self-center">Crediti attuali: {{ current_user.crediti|int }}</h5>
                </div>
            </div>

            <img
            src="{{ url_for('static', filename='img/ant_weightlifting.gif') }}"
            alt="Formica che solleva pesi"
            style="width: 4rem; height: 4rem;">

        </div>

        <div class="mb-3">
            <label
            for="amount"
            class="form-label">
                Inserisci i crediti da aggiungere al tuo utente
            </label>
            <input type="number" id="amount" name="amount" class="form-control" required>
        </div>

        {% if message %}
            <div class="alert alert-success" role="alert">
                <strong>{{ message }}</strong>
            </div>
        {% endif %}

        <button type="submit" class="btn btn-outline-primary btn-lg w-100">Conferma</button>

        <a
        href="{{ url_for('auth.personal_area') }}"
        class="btn btn-outline-secondary btn-sm mt-3 w-50 d-block mx-auto rounded">
        Annulla
        </a>
    </form>
</div>
{% endblock %}
