{%extends "layout.html"%}
{%block title%} Login {% endblock %}
{% block content%}
    <h2 style="text-align: center;">Accedi al tuo account</h2>

    <form method="POST">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Inserisci la password" required>

        <button type="submit">Accedi</button>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </form>

    <p style="text-align:center;">Non hai un account? <a href="{{ url_for('auth.sign_in') }}">Registrati</a></p>
{%endblock%}
