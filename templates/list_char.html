<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Lista personaggi</title>
</head>
<body>
  <h1>Lista personaggi</h1>
  <ul>
    {% for pg in personaggi %}
      <li>
        <strong>{{ pg.nome }}</strong> ({{ pg.__class__.__name__ }})<br>

        <!-- Pulsante per i dettagli -->
        <form method="get" action="{{ url_for('gioco.dettaglio_personaggio', id=loop.index0) }}" style="display:inline;">
          <button type="submit">Dettagli</button>
        </form>

        <!-- Pulsante per eliminare -->
        <form method="post" action="{{ url_for('gioco.elimina_personaggio', id=loop.index0) }}" style="display:inline;">
          <button type="submit" onclick="return confirm('Eliminare {{ pg.nome }}?')">Elimina</button>
        </form>
      </li>
    {% else %}
      <li>Nessun personaggio.</li>
    {% endfor %}
  </ul>

  <!-- Pulsante per tornare al menu -->
  <form action="{{ url_for('gioco.index') }}">
    <button type="submit">Torna al menu principale</button>
  </form>
</body>
</html>
