<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Lista personaggi</title>
</head>
<body>
  <h1>Lista personaggi</h1>
  <ul>
    {% for pg in personaggi %}
      <li>
        <strong>{{ pg.nome }}</strong> ({{ pg.__class__.__name__ }})<br>
        <a href="{{ url_for('gioco.dettaglio_personaggio', id=loop.index0) }}">Dettagli</a>
      </li>
    {% else %}
      <li>Nessun personaggio.</li>
    {% endfor %}
  </ul>
</body>
</html>
